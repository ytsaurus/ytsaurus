name: Java SDK CI
on:
  push:
    branches:
    - main
jobs:
  check:
    name: Run checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: temurin
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
    - name: Execute Gradle build
      run: |
        set -x
        ./gradlew build
    - name: Run tests
      run: |
        set -x
        ./gradlew test --info
    - name: Run integration tests
      run: |
        set -x
        ./gradlew testIntegration --info
    - name: Run integration multicell tests
      run: |
        set -x
        ./gradlew testIntegrationMulticell --info
    - name: Get latest Java SDK tag
      id: latest_tag
      uses: oprypin/find-latest-tag@v1.1.2
      with:
        repository: ytsaurus/ytsaurus
        regex: java-sdk/*
    - name: Get snapshot release version
      id: release_version
      run: |
        set -x
        LATEST_TAG=${{ steps.latest_tag.outputs.tag }}; RELEASE_VERSION=$(echo ${LATEST_TAG#java-sdk/})
        echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_OUTPUT
    - name: Publish snapshot
      if: vars.ENABLE_JAVA_SNAPSHOT_PUBLISHING == '1'
      run: |
        set -x
        ./gradlew publish -PossrhUsername=${{ secrets.OSSRH_USERNAME }} -PossrhPassword=${{ secrets.OSSRH_PASSWORD }} -Pversion="${{ steps.release_version.outputs.RELEASE_VERSION }}-SNAPSHOT" -PsigningPassword=${{ secrets.GPG_PASSWORD }} -PsigningKey="${{ secrets.GPG_PRIVATE_KEY }}"
  send-alert:
    name: Check status and send alert
    needs: check
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Checkout notification script
      uses: actions/checkout@v4
      with:
        path: ytsaurus
        sparse-checkout-cone-mode: false
        sparse-checkout: .github/scripts/send_notifications.py
    - name: Prepare Python
      run: |
        set -x
        pip install PyGithub==2.6.1
    - name: Save conclusion (failure)
      if: needs.check.result == 'failure'
      run: |
        set -x
        CURRENT_JOB_CONCLUSION=failure
        echo "CURRENT_JOB_CONCLUSION=$CURRENT_JOB_CONCLUSION" >> $GITHUB_ENV
    - name: Save conclusion (success)
      if: "!(needs.check.result == 'failure')"
      run: |
        set -x
        CURRENT_JOB_CONCLUSION=success
        echo "CURRENT_JOB_CONCLUSION=$CURRENT_JOB_CONCLUSION" >> $GITHUB_ENV
    - name: Send telegram status report
      id: send-telegram-status-report
      run: |
        set -x
        python3 ytsaurus/.github/scripts/send_notifications.py \
                --repo ${{ github.repository }} \
                --git-token "${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}" \
                --workflow "${{ github.workflow }}" \
                --ref "${{ github.ref_name }}" \
                --tg-token "${{ secrets.TELEGRAM_TOKEN }}" \
                --tg-chat-id ${{ secrets.TELEGRAM_CHAT_ID }} \
                --current-job-conclusion $CURRENT_JOB_CONCLUSION \
                --current-job-id ${{ github.run_id }} \
                --git-server-url "${{ github.api_url }}"
