name: Java SDK CI

on:
  push:
    branches:
      - main
      - members/epsilond1/YT-25366

jobs:
  check:
    name: Run checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Execute Gradle build
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test --info

      - name: Run integration tests
        run: ./gradlew testIntegration --info

      - name: Run integration multicell tests
        run: ./gradlew testIntegrationMulticell --info

      - name: Get latest Java SDK tag
        uses: oprypin/find-latest-tag@v1.1.2
        id: latest_tag
        with:
          repository: ytsaurus/ytsaurus
          regex: 'java-sdk/*'

      - name: Get snapshot release version
        id: release_version
        run: |
          LATEST_TAG=${{ steps.latest_tag.outputs.tag }}; echo "RELEASE_VERSION=$(echo ${LATEST_TAG#java-sdk/})" >> $GITHUB_OUTPUT

      - name: Publish snapshot
        if: ${{ vars.ENABLE_JAVA_SNAPSHOT_PUBLISHING == '1' }}
        run: ./gradlew publish -PossrhUsername=${{ secrets.OSSRH_USERNAME }} -PossrhPassword=${{ secrets.OSSRH_PASSWORD }} -Pversion="${{ steps.release_version.outputs.RELEASE_VERSION }}-SNAPSHOT" -PsigningPassword=${{ secrets.GPG_PASSWORD }} -PsigningKey="${{ secrets.GPG_PRIVATE_KEY }}"

  send-notifications:
    name: Send notifications
    needs:
      - check
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Send telegram status report
        id: send-telegram-status-report
        run: |
          python3 ../ytsaurus/ytsaurus/.github/scripts/send_notifications.py \
                  --repo ytsaurus/ytsaurus \
                  --git-token "${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}" \
                  --workflow "${{github.workflow}}" \
                  --ref "${{github.ref_name}}" \
                  --ref-type "${{github.ref_type}}" \
                  --tg-token "${{ secrets.TELEGRAM_TOKEN }}" \
                  --tg-chat-id ${{ secrets.TELEGRAM_CHAT_ID }} \
                  --current-job-conclusion ${{ needs.check.result }} \
                  --current-job-id ${{github.run_id}} \
                  --commit-message "${{github.event.head_commit.message}}" \
                  --git-server-url "${{github.server_url}}"
