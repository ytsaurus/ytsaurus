name: Release Monitoring

on:
  push:
    tags:
      - 'docker/monitoring/0\.[0-9]+\.[0-9]+*'

jobs:
  release:
    name: Run release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v1
        with:
          version: v3.11.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Docker login
        run: |
          echo '${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}' | docker login ghcr.io --username ${{ secrets.GH_USERNAME }} --password-stdin

      - name: Parse Tag
        id: tag
        run: |
          echo "RELEASE_VERSION=$(echo ${GITHUB_REF#refs/*/docker/monitoring/})" >> $GITHUB_OUTPUT

      - name: Build And Push Docker Image And Helm Chart
        run: |
          make -C yt/docker/monitoring release-all \
            VERSION=${{ steps.tag.outputs.RELEASE_VERSION }} \
            DOCKER_REPOSITORY=monitoring \
            CHART_REPOSITORY=monitoring-chart
