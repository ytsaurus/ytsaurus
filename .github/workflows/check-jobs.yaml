name: Check jobs
on:
  workflow_call:
    inputs:
      runs-on-value:
        required: true
        type: string
      build-dir:
        required: true
        type: string
      run-unittests:
        default: false
        required: false
        type: boolean
      run-integration-tests:
        default: false
        required: false
        type: boolean
      run-python-tests:
        default: false
        required: false
        type: boolean
      run-odin-tests:
        default: false
        required: false
        type: boolean

jobs:
  check:
    runs-on: ${{ inputs.runs-on-value }}
    steps:
      - name: Unittests
        if: ${{ inputs.run-unittests }}
        # SMOKE-ONLY: never let a unittest result gate the Flow tests step.
        continue-on-error: true
        shell: bash
        run: |
          ./ytsaurus/yt/yt/scripts/run_tests.sh unittests --build-path ../${{ inputs.build-dir }}

      - name: Setup build symlink
        if: ${{ inputs.run-integration-tests || inputs.run-python-tests || inputs.run-odin-tests }}
        shell: bash
        run: |
          rm -rf "$(pwd)/../build"
          ln -sfn "$(pwd)/../${{ inputs.build-dir }}" "$(pwd)/../build"

      - name: Integration tests
        if: ${{ inputs.run-integration-tests }}
        shell: bash
        run: |
          ./ytsaurus/yt/yt/scripts/run_tests.sh integration

      - name: Flow tests
        if: ${{ inputs.run-integration-tests }}
        shell: bash
        run: |
          ./ytsaurus/yt/yt/scripts/run_tests.sh flow

      - name: Python tests
        if: ${{ inputs.run-python-tests }}
        shell: bash
        run: |
          ./ytsaurus/yt/yt/scripts/run_tests.sh python

      - name: Odin tests
        if: ${{ inputs.run-odin-tests }}
        shell: bash
        run: |
          ytsaurus/yt/odin/tests/run_tests.sh
