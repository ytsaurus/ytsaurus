name: Build Jobs
on:
  workflow_call:
    inputs:
      runs-on-value:
        required: true
        type: string
      cpp-build-system:
        required: false
        # cmake or ya-make
        type: string
        default: ''
      build-ytsaurus:
        default: false
        required: false
        type: boolean
      build-ytsaurus-tests:
        default: false
        required: false
        type: boolean
      build-chyt:
        default: false
        required: false
        type: boolean
      build-query-tracker:
        default: false
        required: false
        type: boolean
      build-yql-python-udfs:
        default: true
        required: false
        type: boolean
      build-python:
        default: false
        required: false
        type: boolean
      update-remote-cache:
        default: false
        required: false
        type: boolean
      skip-python-packages:
        default: false
        required: false
        type: boolean
      build-types:
        description: 'JSON array of build types: ["release"], ["relwithdebinfo"], or ["release","relwithdebinfo"]'
        required: true
        type: string
      version-patch:
        description: 'Passed to ya make as -DYT_VERSION_PATCH. If empty, not set.'
        required: false
        default: ''
        type: string
      version-branch:
        description: 'Passed to ya make as -DYT_VERSION_BRANCH. If empty, not set.'
        required: false
        default: ''
        type: string

    secrets:
      BUILD_CACHE_BAZEL_USERNAME:
        required: true
      BUILD_CACHE_BAZEL_PASSWORD:
        required: true

jobs:
  venv:
    runs-on: ${{ inputs.runs-on-value }}
    timeout-minutes: 480
    steps:
      - name: Prepare python virtual environment
        run: |
          python3.11 -m venv ../venv

  gpuagent:
    needs: venv
    runs-on: ${{ inputs.runs-on-value }}
    if: ${{ inputs.build-ytsaurus }}
    timeout-minutes: 480
    steps:
      - name: Build GPU Agent
        run: |
          cd ../ytsaurus/ytsaurus/yt/yt/gpuagent
          export HOME=${RUNNER_WORKSPACE}
          /opt/go/bin/go build -o gpuagent ./cmd/agent

  cmake_build:
    needs: venv
    runs-on: ${{ inputs.runs-on-value }}
    timeout-minutes: 480
    if: ${{ inputs.cpp-build-system == 'cmake' }}
    strategy:
      fail-fast: false
      matrix:
        build-type: ${{ fromJson(inputs.build-types) }}

    steps:
      - name: Create build directories
        run: |
          for prefix in build \
                        build_yql
          do
            build_dir=${prefix}_${{ inputs.cpp-build-system}}_${{ matrix.build-type }}
            mkdir -p ../${build_dir}
            cd ../${build_dir}
            rm -rf *
          done

      - name: Configure ytsaurus (${{ matrix.build-type }})
        if: ${{ inputs.build-ytsaurus || inputs.build-chyt || inputs.build-query-tracker || inputs.build-python }}
        run: |
          CMAKE_BUILD_TYPE="RelWithDebInfo"
          if [ "${{ matrix.build-type }}" = "release" ]; then
            CMAKE_BUILD_TYPE="Release"
          fi
          READ_ONLY=""
          if [ "${{ inputs.update-remote-cache }}" == "false" ]; then
            READ_ONLY="--read-only-cache"
          fi
          ./ytsaurus/yt/yt/scripts/build_cmake.sh configure \
            --source-path ../ytsaurus/ytsaurus \
            --build-path ../build_${{ inputs.cpp-build-system }}_${{ matrix.build-type }} \
            --build-type "${CMAKE_BUILD_TYPE}" \
            --ccache-remote-storage "http://${{ secrets.BUILD_CACHE_BAZEL_USERNAME }}:${{ secrets.BUILD_CACHE_BAZEL_PASSWORD }}@${{ vars.BUILD_CACHE_BAZEL_HOST }}|layout=bazel" \
            ${READ_ONLY}

      - name: Build Python packages (cmake, ${{ matrix.build-type }})
        if: ${{ inputs.build-python }}
        run: |
          ./ytsaurus/yt/yt/scripts/build_cmake.sh build-python \
            --source-path ../ytsaurus/ytsaurus \
            --build-path ../build_${{ inputs.cpp-build-system }}_${{ matrix.build-type }} \
            --venv-path ../venv \
            --commit-hash ${GITHUB_SHA}

      - name: Build ytsaurus (cmake, ${{ matrix.build-type }})
        if: ${{ inputs.build-ytsaurus || inputs.build-chyt || inputs.build-query-tracker }}
        run: |
          TARGETS=""
          if [ "${{ matrix.build-type }}" != "relwithdebinfo" ]; then
            TARGETS="ytserver-all ytserver-clickhouse"
          fi
          ./ytsaurus/yt/yt/scripts/build_cmake.sh build \
            --build-path ../build_${{ inputs.cpp-build-system }}_${{ matrix.build-type }} \
            --targets "${TARGETS}"

      - name: Build YQL agent (cmake, ${{ matrix.build-type }})
        if: ${{ inputs.build-query-tracker }}
        run: |
          cd ../build_yql_${{ inputs.cpp-build-system}}_${{ matrix.build-type }}

          ninja libcompress_udf.so
          ninja libdatetime2_udf.so
          ninja libdigest_udf.so
          ninja libdsv_udf.so
          ninja libfile_udf.so
          ninja libhistogram_udf.so
          ninja libhyperloglog_udf.so
          ninja libhyperscan_udf.so
          ninja libip_udf.so
          ninja libjson2_udf.so
          ninja libjson_udf.so
          ninja libmath_udf.so
          ninja libpire_udf.so
          ninja libprotobuf_udf.so
          ninja libre2_udf.so
          ninja libset_udf.so
          ninja libstat_udf.so
          ninja libstreaming_udf.so
          ninja libstring_udf.so
          ninja libtopfreq_udf.so
          ninja libtop_udf.so
          ninja libunicode_udf.so
          ninja liburl_udf.so
          ninja libyqlplugin.so
          ninja libyson2_udf.so

          cd ../build_${{ matrix.build-type }}
          ninja mrjob
          ninja ytserver-yql-agent

  ya-make_build:
    needs: venv
    runs-on: ${{ inputs.runs-on-value }}
    timeout-minutes: 480
    if: ${{ inputs.cpp-build-system == 'ya-make' }}
    strategy:
      fail-fast: false
      matrix:
        build-type: ${{ fromJson(inputs.build-types) }}
    steps:
      - name: Calculate variables
        id: vars
        run: |
          BUILD_FLAGS="--thinlto --stat -DCGO_ENABLED=0 -DCFLAGS=-fsized-deallocation --bazel-remote-store --bazel-remote-base-uri=http://${{ vars.BUILD_CACHE_BAZEL_HOST }}"

          if [ "${{ inputs.update-remote-cache }}" == "true" ]; then
            BUILD_FLAGS="${BUILD_FLAGS} --bazel-remote-username=${{ secrets.BUILD_CACHE_BAZEL_USERNAME }} --bazel-remote-password=${{ secrets.BUILD_CACHE_BAZEL_PASSWORD }}"
          fi

          STRIP_VALUE=no
          BUILD_TYPE=profile
          if [ "${{ matrix.build-type }}" == "release" ]; then
            STRIP_VALUE=yes
            BUILD_TYPE=release
          fi

          BUILD_FLAGS="${BUILD_FLAGS} --build=${BUILD_TYPE}"
          if [ -n "${{ inputs.version-patch }}" ]; then
            BUILD_FLAGS="${BUILD_FLAGS} -DYT_VERSION_PATCH=\"${{ inputs.version-patch }}\""
          fi
          if [ -n "${{ inputs.version-branch }}" ]; then
            BUILD_FLAGS="${BUILD_FLAGS} -DYT_VERSION_BRANCH=\"${{ inputs.version-branch }}\""
          fi
          echo "BUILD_FLAGS=$BUILD_FLAGS" >> $GITHUB_OUTPUT
          echo "STRIP_VALUE=$STRIP_VALUE" >> $GITHUB_OUTPUT

      - name: Create build directories
        run: |
          build_dir_prefixes=()

          for prefix in build \
                        build_yql
          do
            build_dir=${prefix}_${{ inputs.cpp-build-system}}_${{ matrix.build-type }}
            mkdir -p ../${build_dir}
            cd ../${build_dir}
            rm -rf *
          done

      - name: Build Python packages (ya-make, ${{ matrix.build-type }})
        if: ${{ inputs.build-python }}
        run: |
          build_dir=../build_${{ inputs.cpp-build-system}}_${{ matrix.build-type }}
          cd ${build_dir}

          BUILD_FLAGS="${{ steps.vars.outputs.BUILD_FLAGS }} -DSTRIP=yes -DUSE_ARCADIA_PYTHON=no -DUSE_LOCAL_PYTHON -DPYTHON_CONFIG=python3.11-config -DPYTHON_BIN=python3.11"

          PYTHON_SHARED_TARGETS="\
            ../ytsaurus/ytsaurus/yt/yt/python/yson_shared \
            ../ytsaurus/ytsaurus/yt/yt/python/driver/native_shared \
            ../ytsaurus/ytsaurus/yt/yt/python/driver/rpc_shared"

          if [ "${{ inputs.update-remote-cache }}" == "true" ]; then
            ../ytsaurus/ytsaurus/ya make --output=. ${BUILD_FLAGS} --bazel-remote-put ${PYTHON_SHARED_TARGETS}
          fi

          ../ytsaurus/ytsaurus/ya make --output=. ${BUILD_FLAGS} ${PYTHON_SHARED_TARGETS}

          if [ "${{ inputs.skip-python-packages }}" == "false" ]; then
            cd ../ytsaurus

            source ../venv/bin/activate
            YTSAURUS_COMMIT_HASH=${GITHUB_SHA} ./ytsaurus/yt/python/packages/build_ytsaurus_packages.sh --ytsaurus-source-path $(pwd)/ytsaurus --ytsaurus-build-path ${build_dir}
          fi

      - name: Build ytsaurus (ya-make, ${{ matrix.build-type }})
        if: ${{ inputs.build-ytsaurus || inputs.build-chyt || inputs.build-query-tracker }}
        run: |
          cd ../build_${{ inputs.cpp-build-system}}_${{ matrix.build-type }}

          BUILD_FLAGS="${{ steps.vars.outputs.BUILD_FLAGS }} -DSTRIP=${{ steps.vars.outputs.STRIP_VALUE }}"

          YTSAURUS_TARGETS="\
            ../ytsaurus/ytsaurus/yt/yt/server/all \
            ../ytsaurus/ytsaurus/yt/chyt/server/bin \
            ../ytsaurus/ytsaurus/yt/chyt/trampoline \
            ../ytsaurus/ytsaurus/yt/python/yt/environment/bin/init_operations_archive \
            ../ytsaurus/ytsaurus/yt/python/yt/environment/bin/init_queue_agent_state \
            ../ytsaurus/ytsaurus/yt/python/yt/environment/bin/init_query_tracker_state"

          if [ "${{ inputs.update-remote-cache }}" == "true" ]; then
            ../ytsaurus/ytsaurus/ya make ${BUILD_FLAGS} --bazel-remote-put --output=. ${YTSAURUS_TARGETS}
          fi

          ../ytsaurus/ytsaurus/ya make ${BUILD_FLAGS} --output=. ${YTSAURUS_TARGETS}

      - name: Build ytsaurus tests dependencies (ya-make, ${{ matrix.build-type }})
        if: ${{ (inputs.build-ytsaurus || inputs.build-query-tracker) && inputs.build-ytsaurus-tests && (matrix.build-type == 'relwithdebinfo') }}
        run: |
          cd ../build_${{ inputs.cpp-build-system}}_${{ matrix.build-type }}

          BUILD_FLAGS="${{ steps.vars.outputs.BUILD_FLAGS }} -DSTRIP=${{ steps.vars.outputs.STRIP_VALUE }}"

          BUILD_FLAGS=$(echo ${BUILD_FLAGS} | sed 's/--thinlto//')

          FOLDERS_WITH_UNITTESTS=""
          for makefile in $(find ../ytsaurus/ytsaurus/ -name "ya.make" -exec grep -l -e "GTEST(unittester-" -e "UNITTEST()" {} +); do
            folder=$(dirname ${makefile})
            echo ${folder}
            FOLDERS_WITH_UNITTESTS="${FOLDERS_WITH_UNITTESTS} ${folder}"
          done

          if [ "${{ inputs.update-remote-cache }}" == "true" ]; then
            ../ytsaurus/ytsaurus/ya make ${BUILD_FLAGS} --output=. -A --test-prepare --bazel-remote-put ${FOLDERS_WITH_UNITTESTS}
          fi
          ../ytsaurus/ytsaurus/ya make ${BUILD_FLAGS} --output=. -A --test-prepare ${FOLDERS_WITH_UNITTESTS}

          for build_folder in yt/yt/tests/integration/size_s \
                              yt/yt/tests/integration/size_m \
                              yt/yt/tests/integration/size_l \
                              yt/yt/tests/integration/size_xl
          do
            echo ${build_folder}
            build_folder=../ytsaurus/ytsaurus/${build_folder}
            if [ "${{ inputs.update-remote-cache }}" == "true" ]; then
              ../ytsaurus/ytsaurus/ya make ${BUILD_FLAGS} --output=. ${build_folder} -A --test-prepare --bazel-remote-put
            fi
            ../ytsaurus/ytsaurus/ya make ${BUILD_FLAGS} --output=. ${build_folder} -A --test-prepare
          done

          # Flow pytest binaries: the flow runner resolves flow_server and the
          # cpp example pipelines through their build-tree paths (the same way
          # the integration tests reach ytserver-all), so build them here into
          # the ya-make build root instead of the cmake build.
          #
          # The java/kotlin examples are deliberately absent: they PEERDIR the
          # unversioned contrib/java/<group>/<artifact> dispatchers, whose
          # ya.make files are not part of the opensource export yet (only the
          # versioned subdirectories are), so configuring them here fails with
          # "PEERDIR to directory without ya.make".
          FLOW_TARGETS="\
            ../ytsaurus/ytsaurus/yt/yt/flow/bin/flow_server \
            ../ytsaurus/ytsaurus/yt/yt/flow/examples/cpp"
          if [ "${{ inputs.update-remote-cache }}" == "true" ]; then
            ../ytsaurus/ytsaurus/ya make ${BUILD_FLAGS} --output=. --bazel-remote-put ${FLOW_TARGETS}
          fi
          ../ytsaurus/ytsaurus/ya make ${BUILD_FLAGS} --output=. ${FLOW_TARGETS}

      - name: Build YQL agent (ya-make, ${{ matrix.build-type }})
        if: ${{ inputs.build-query-tracker }}
        run: |
          cd ../build_yql_${{ inputs.cpp-build-system}}_${{ matrix.build-type }}

          export YTSAURUS_SOURCE_PATH="$(realpath $(pwd)/../ytsaurus/ytsaurus)"
          export YQL_BUILD_PATH="."
          export BUILD_FLAGS="${{ steps.vars.outputs.BUILD_FLAGS }} -DSTRIP=${{ steps.vars.outputs.STRIP_VALUE }}"

          SCRIPT_FLAGS=""
          if [ "${{ inputs.build-yql-python-udfs }}" == "true" ]; then
            SCRIPT_FLAGS="${SCRIPT_FLAGS} --build-python-udfs yes"
          else
            SCRIPT_FLAGS="${SCRIPT_FLAGS} --build-python-udfs no"
          fi

          if [ "${{ inputs.update-remote-cache }}" == "true" ]; then
            BUILD_FLAGS="${BUILD_FLAGS} --bazel-remote-put" ../ytsaurus/ytsaurus/yt/docker/ya-build/query-tracker/build_yql_agent.sh ${SCRIPT_FLAGS}
          fi

          ../ytsaurus/ytsaurus/yt/docker/ya-build/query-tracker/build_yql_agent.sh ${SCRIPT_FLAGS}
