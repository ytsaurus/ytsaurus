                --yql-build-path ../build_yql_ya-make_relwithdebinfo \
                --output-path ../docker-query-tracker \
                --image-tag ${{ needs.tag.outputs.image-tag }}-relwithdebinfo \
                --image-cr ghcr.io/ \
                --apt-mirror ${{ vars.APT_MIRROR }}

        retry docker push ghcr.io/ytsaurus/query-tracker:${{ needs.tag.outputs.image-tag }}-relwithdebinfo
        docker tag ghcr.io/ytsaurus/query-tracker:${{ needs.tag.outputs.image-tag }}-relwithdebinfo ghcr.io/ytsaurus/query-tracker-nightly:${{ needs.tag.outputs.nightly-image-tag }}-relwithdebinfo
        retry docker push ghcr.io/ytsaurus/query-tracker-nightly:${{ needs.tag.outputs.nightly-image-tag }}-relwithdebinfo
    - name: Docker push chyt
      run: |
        source docker-jobs-retry.sh
        mkdir -p ../docker-chyt

        retry ./ytsaurus/yt/docker/ytsaurus/build.sh \
                --component chyt \
                --ytsaurus-source-path $(pwd)/ytsaurus \
                --ytsaurus-build-path ../build_ya-make_relwithdebinfo \
                --output-path ../docker-chyt \
                --image-tag ${{ needs.tag.outputs.image-tag }}-relwithdebinfo \
                --image-cr ghcr.io/ \
                --apt-mirror ${{ vars.APT_MIRROR }}

        retry docker push ghcr.io/ytsaurus/chyt:${{ needs.tag.outputs.image-tag }}-relwithdebinfo
        docker tag ghcr.io/ytsaurus/chyt:${{ needs.tag.outputs.image-tag }}-relwithdebinfo ghcr.io/ytsaurus/chyt-nightly:${{ needs.tag.outputs.nightly-image-tag }}-relwithdebinfo
        retry docker push ghcr.io/ytsaurus/chyt-nightly:${{ needs.tag.outputs.nightly-image-tag }}-relwithdebinfo
    - name: Docker push local
      run: |
        source docker-jobs-retry.sh
        mkdir -p ../docker-local

        retry ./ytsaurus/yt/docker/ytsaurus/build.sh \
                --component local \
                --ytsaurus-source-path $(pwd)/ytsaurus \
                --ytsaurus-build-path ../build_ya-make_relwithdebinfo \
                --yql-build-path ../build_yql_ya-make_relwithdebinfo \
                --output-path ../docker-local \
                --image-tag ${{ needs.tag.outputs.image-tag }}-relwithdebinfo \
                --image-cr ghcr.io/ \
                --apt-mirror ${{ vars.APT_MIRROR }}

        retry docker push ghcr.io/ytsaurus/local:${{ needs.tag.outputs.image-tag }}-relwithdebinfo
        docker tag ghcr.io/ytsaurus/local:${{ needs.tag.outputs.image-tag }}-relwithdebinfo ghcr.io/ytsaurus/local-nightly:${{ needs.tag.outputs.nightly-image-tag }}-relwithdebinfo
        retry docker push ghcr.io/ytsaurus/local-nightly:${{ needs.tag.outputs.nightly-image-tag }}-relwithdebinfo
    - name: Clear workspace
      if: always()
      run: |
        rm -rf ../docker-ytsaurus
        rm -rf ../docker-query-tracker
        rm -rf ../docker-chyt
        rm -rf ../docker-local
  stop-vm:
    name: Stop VM
    needs:
    - start-vm
    - yamake-release
    - yamake-relwithdebinfo
    - gpu-agent
    - test-yamake
    - docker-release
    - docker-relwithdebinfo
    if: always()
    runs-on: trampoline
    steps:
    - name: Stop YC runner
      uses: yc-actions/yc-github-runner@v1
      with:
        mode: stop
        yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
        label: ${{ needs.start-vm.outputs.label }}
        instance-id: ${{ needs.start-vm.outputs.instance-id }}
  send-alert:
    name: Check status and send alert
    needs:
    - test-yamake
    - docker-release
    - docker-relwithdebinfo
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Checkout notification script
      uses: actions/checkout@v4
      with:
        path: ytsaurus
        sparse-checkout-cone-mode: false
        sparse-checkout: .github/scripts/send_notifications.py
    - name: Prepare Python
      run: pip install PyGithub==2.6.1
    - name: Save conclusion (failure)
      if: needs.test-yamake.result == 'failure' || needs.docker-release.result == 'failure' || needs.docker-relwithdebinfo.result == 'failure'
      run: |
        CURRENT_JOB_CONCLUSION=failure
        echo "CURRENT_JOB_CONCLUSION=$CURRENT_JOB_CONCLUSION" >> $GITHUB_ENV
    - name: Save conclusion (success)
      if: "!(needs.test-yamake.result == 'failure' || needs.docker-release.result == 'failure' || needs.docker-relwithdebinfo.result == 'failure')"
      run: |
        CURRENT_JOB_CONCLUSION=success
        echo "CURRENT_JOB_CONCLUSION=$CURRENT_JOB_CONCLUSION" >> $GITHUB_ENV
    - name: Send telegram status report
      id: send-telegram-status-report
      run: |
        python3 ytsaurus/.github/scripts/send_notifications.py \
                --repo ${{ github.repository }} \
                --git-token "${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}" \
                --workflow "${{ github.workflow }}" \
                --ref "${{ github.ref_name }}" \
                --tg-token "${{ secrets.TELEGRAM_TOKEN }}" \
                --tg-chat-id ${{ secrets.TELEGRAM_CHAT_ID }} \
                --current-job-conclusion $CURRENT_JOB_CONCLUSION \
                --current-job-id ${{ github.run_id }} \
                --git-server-url "${{ github.api_url }}"
