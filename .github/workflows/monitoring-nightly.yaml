name: Release Monitoring Nightly

on:
  push:
    branches:
      - main
    tags:
      - 'docker-test/monitoring/0\.[0-9]+\.[0-9]+*'
    paths:
      - '.github/workflows/monitoring-nightly.yaml'
      - 'yt/docker/charts/monitoring-chart/**'
      - 'yt/docker/monitoring/**'
      - 'yt/admin/dashboards/**'
      - 'yt/admin/dashboard_generator/**'

jobs:
  release:
    name: Run release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v1
        with:
          version: v3.11.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Docker login
        run: |
          echo '${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}' | docker login ghcr.io --username ${{ secrets.GH_USERNAME }} --password-stdin

      - name: Parse Tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "RELEASE_VERSION=$(echo ${GITHUB_REF#refs/tags/docker-test/monitoring/})" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_VERSION=0.0.1-dev-${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build And Push Docker Image And Helm Chart
        run: |
          make -C yt/docker/monitoring release-all VERSION=${{ steps.tag.outputs.RELEASE_VERSION }}
