name: Strawberry Nightly

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/strawberry-nightly.yaml'
      - '.github/workflows/strawberry-action.yaml'
      - 'yt/chyt/controller/**'
      - 'yt/docker/ytsaurus/build.sh'
      - 'yt/docker/ytsaurus/Dockerfile'
      - 'yt/docker/ytsaurus/credits/strawberry/**'

jobs:
  tag:
    name: Compute nightly tag
    runs-on: ubuntu-latest
    outputs:
      nightly-tag: ${{ steps.tag.outputs.NIGHTLY_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ytsaurus
          fetch-depth: 256

      - name: Compute nightly tag
        id: tag
        run: |
          NIGHTLY_TAG=dev-$(git -C ytsaurus show -s --pretty=%cs)-${GITHUB_SHA}
          echo "NIGHTLY_TAG=$NIGHTLY_TAG" >> $GITHUB_OUTPUT

  image:
    needs: tag
    uses: ./.github/workflows/strawberry-action.yaml
    with:
      runs-on-value: ubuntu-latest
      push-nightly-tag: ${{ needs.tag.outputs.nightly-tag }}
    secrets:
      GH_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
      GH_USERNAME: ${{ secrets.GH_USERNAME }}

  send-alert:
    needs: image
    if: always()
    uses: ./.github/workflows/check-status-and-send-alert.yaml
    with:
      is_failure: ${{ contains(join(needs.*.result, ','), 'failure') }}
    secrets:
      GH_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
