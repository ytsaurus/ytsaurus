    timeout-minutes: 480
    steps:
    - name: Unittests (cmake)
      shell: bash
      run: |
        set -x
        cp ./ytsaurus/yt/yt/scripts/run_unittests.sh ../build_cmake_relwithdebinfo
        ln -s $(pwd)/../build_cmake_relwithdebinfo $(pwd)/../build
        cd ../build
        ./run_unittests.sh
  stop-vm:
    name: Stop VM
    needs:
    - start-vm
    - cmake-release
    - cmake-relwithdebinfo
    - test-cmake
    if: always()
    runs-on: trampoline
    steps:
