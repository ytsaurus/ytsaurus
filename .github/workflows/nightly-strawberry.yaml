name: Nightly Strawberry
on:
  push:
    branches:
    - main
    - stable/[0-9]+\.[0-9]+
    - members/ilyaibraev/check-wfgen
  workflow_dispatch:
jobs:
  build-and-push:
    name: Build and push Strawberry
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        path: ytsaurus
    - name: Build strawberry controller
      run: |
        set -x
        cd ytsaurus/yt/chyt/controller/cmd/chyt-controller
        go build
    - name: Calculate docker tag
      id: tag
      run: |
        set -x
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IMAGE_TAG=dev-test
        else
            if [[ $GITHUB_REF =~ main$ ]]; then
                IMAGE_TAG=dev
            elif [[ $GITHUB_REF =~ stable ]]; then
                IMAGE_TAG=dev-${GITHUB_REF#refs/*/stable/}
            elif [[ $GITHUB_REF =~ "query-tracker" ]]; then
                IMAGE_TAG=dev-${GITHUB_REF#refs/*/query-tracker/}
            elif [[ $GITHUB_REF =~ "chyt" ]]; then
                IMAGE_TAG=dev-${GITHUB_REF#refs/*/chyt/}
            else
                IMAGE_TAG=dev-test
            fi
        fi

        NIGHTLY_IMAGE_TAG=${IMAGE_TAG}-$(git -C ytsaurus show -s --pretty=%cs)-${{ github.sha }}
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "NIGHTLY_IMAGE_TAG=$NIGHTLY_IMAGE_TAG" >> $GITHUB_OUTPUT
    - name: Setup retry function
      run: |
        set -x
        cat << 'EOF' > docker-jobs-retry.sh
        function retry {
            local retries=3
            local count=0
            until "$@"; do
                exit_code=$?
                count=$(($count + 1))
                if [ $count -lt $retries ]; then
                    echo "Attempt $count failed with exit code $exit_code. Retrying..."
                else
                    echo "Attempt $count failed with exit code $exit_code. No more retries."
                    return $exit_code
                fi
            done
            return 0
        }
        EOF
        chmod +x docker-jobs-retry.sh
    - name: Docker login
      run: |
        set -x
        echo '${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}' | docker login ghcr.io --username ${{ secrets.GH_USERNAME }} --password-stdin
    - name: Docker push strawberry
      run: |
        set -x
        source docker-jobs-retry.sh
        mkdir -p ../docker-strawberry

        retry ./ytsaurus/yt/docker/ytsaurus/build.sh \
                --component strawberry \
                --ytsaurus-source-path $(pwd)/ytsaurus \
                --output-path ../docker-strawberry \
                --image-tag ${{ steps.tag.outputs.IMAGE_TAG }} \
                --image-cr ghcr.io/ \
                --apt-mirror ${{ vars.APT_MIRROR }}

        retry docker push ghcr.io/ytsaurus/strawberry:${{ steps.tag.outputs.IMAGE_TAG }}
        docker tag ghcr.io/ytsaurus/strawberry:${{ steps.tag.outputs.IMAGE_TAG }} ghcr.io/ytsaurus/strawberry-nightly:${{ steps.tag.outputs.NIGHTLY_IMAGE_TAG }}
        retry docker push ghcr.io/ytsaurus/strawberry-nightly:${{ steps.tag.outputs.NIGHTLY_IMAGE_TAG }}
    - name: Clear workspace
      if: always()
      run: |
        set -x
        rm -rf ../docker-strawberry
  send-alert:
    name: Check status and send alert
    needs: build-and-push
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Checkout notification script
      uses: actions/checkout@v4
      with:
        path: ytsaurus
        sparse-checkout-cone-mode: false
        sparse-checkout: .github/scripts/send_notifications.py
    - name: Prepare Python
      run: |
        set -x
        pip install PyGithub==2.6.1
    - name: Save conclusion (failure)
      if: needs.build-and-push.result == 'failure'
      run: |
        set -x
        CURRENT_JOB_CONCLUSION=failure
        echo "CURRENT_JOB_CONCLUSION=$CURRENT_JOB_CONCLUSION" >> $GITHUB_ENV
    - name: Save conclusion (success)
      if: "!(needs.build-and-push.result == 'failure')"
      run: |
        set -x
        CURRENT_JOB_CONCLUSION=success
        echo "CURRENT_JOB_CONCLUSION=$CURRENT_JOB_CONCLUSION" >> $GITHUB_ENV
    - name: Send telegram status report
      id: send-telegram-status-report
      run: |
        set -x
        python3 ytsaurus/.github/scripts/send_notifications.py \
                --repo ${{ github.repository }} \
                --git-token "${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}" \
                --workflow "${{ github.workflow }}" \
                --ref "${{ github.ref_name }}" \
                --tg-token "${{ secrets.TELEGRAM_TOKEN }}" \
                --tg-chat-id ${{ secrets.TELEGRAM_CHAT_ID }} \
                --current-job-conclusion $CURRENT_JOB_CONCLUSION \
                --current-job-id ${{ github.run_id }} \
                --git-server-url "${{ github.api_url }}"
