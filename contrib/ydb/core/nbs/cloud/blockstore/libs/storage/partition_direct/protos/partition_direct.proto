syntax = "proto3";

import "contrib/ydb/core/protos/blobstorage_ddisk.proto";
import "contrib/ydb/core/protos/blockstore_config.proto";
import "contrib/ydb/core/nbs/cloud/blockstore/config/protos/storage.proto";

package NYdb.NBS.PartitionDirect.NProto;
option java_package = "ru.yandex.ydb.core.nbs.partition_direct.proto";

message TDBGConnectionsIds {
    message TDDiskConnectionIds {
        NKikimrBlobStorage.NDDisk.TDDiskId DDiskId = 1;
        NKikimrBlobStorage.NDDisk.TDDiskId PersistentBufferDDiskId = 2;
    }
    repeated TDDiskConnectionIds DDiskConnectionIds = 1;
}

message TTabletInfo {
    NYdb.NBS.NProto.TStorageServiceConfig StorageConfig = 1;
    NKikimrBlockStore.TVolumeConfig VolumeConfig = 2;
    repeated TDBGConnectionsIds DBGConnectionsIds = 3;
}
