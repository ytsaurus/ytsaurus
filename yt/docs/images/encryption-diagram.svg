<svg width="700" height="450" viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="680" height="430" fill="#ffffff" />

  <!-- HTTP Request Box (between Client and Cluster) -->
  <rect x="270" y="85" width="160" height="30" rx="5" ry="5" fill="#e0e0e0" stroke="#999" stroke-width="1" />
  <text x="350" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">
    HTTP запрос
  </text>

  <!-- YTsaurus Cluster Box -->
  <rect x="25" y="125" width="650" height="300" rx="10" ry="10" fill="#f5f5f5" stroke="#999" stroke-width="2" stroke-dasharray="5,5" />
  <text x="350" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#666">
    YTsaurus кластер
  </text>

  <!-- External Client (top) -->
  <rect x="270" y="20" width="160" height="60" rx="5" ry="5" fill="#e1f5fe" stroke="#03a9f4" stroke-width="2" />
  <text x="350" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
    Внешний клиент
  </text>

  <!-- HTTP Proxy (top inside cluster) -->
  <rect x="270" y="180" width="160" height="70" rx="5" ry="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" />
  <text x="350" y="205" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
    HTTP Proxy
  </text>
  <text x="350" y="225" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#555">
    bus_client
  </text>
  <text x="350" y="240" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#777">
    точка входа для HTTP API
  </text>

  <!-- Master Server (bottom left) -->
  <rect x="75" y="340" width="160" height="70" rx="5" ry="5" fill="#e8f5e8" stroke="#4caf50" stroke-width="2" />
  <text x="155" y="365" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
    Master Server
  </text>
  <text x="95" y="385" font-family="Arial, sans-serif" font-size="11" text-anchor="start" fill="#555">
    bus_client + bus_server
  </text>
  <text x="155" y="400" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#777">
    хранит метаданные
  </text>

  <!-- Data Nodes (bottom right) -->
  <rect x="465" y="340" width="160" height="70" rx="5" ry="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2" />
  <text x="545" y="365" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
    Data Nodes
  </text>
  <text x="545" y="385" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#555">
    bus_client + bus_server
  </text>
  <text x="545" y="400" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#777">
    хранят данные
  </text>

  <!-- Connection: Client -> HTTP Request Box -->
  <line x1="350" y1="80" x2="350" y2="85" stroke="#03a9f4" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Connection: HTTP Request Box -> HTTP Proxy -->
  <line x1="350" y1="115" x2="350" y2="180" stroke="#03a9f4" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Connection: HTTP Proxy <-> Master Server -->
  <line x1="270" y1="250" x2="235" y2="340" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="242" y1="323" x2="270" y2="250" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="140" y="290" font-family="Arial, sans-serif" font-size="10" fill="#666">
    bus_client ↔ bus_server
  </text>

  <!-- Connection: HTTP Proxy <-> Data Nodes -->
  <line x1="430" y1="250" x2="465" y2="340" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="458" y1="322" x2="430" y2="250" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="460" y="290" font-family="Arial, sans-serif" font-size="10" fill="#666">
    bus_client ↔ bus_server
  </text>

  <!-- Connection: Master Server <-> Data Nodes -->
  <line x1="235" y1="375" x2="465" y2="375" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="447" y1="375" x2="235" y2="375" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="350" y="368" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">
    bus_client ↔ bus_server
  </text>
</svg>