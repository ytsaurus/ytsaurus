# Common presets for both ru and en languages.
default:
    yt-server-version: 25.3.1
    k8s-operator-version: 0.31.0
    chyt-version: 2.18.2
    spyt-version: 2.9.0
    strawberry-version: 0.0.17
    qt-version: 0.1.2
    yt-stable-branch: 25.3
    python-sdk-version: 0.13.48
    java-sdk-version: 1.2.14
    python-yson-version: 0.4.10
    cert-manager-version: v1.17.1
    cron-version: 0.0.4
    odin-version: 0.0.8
    tutorial-version: 0.0.4
    sidecars-version: 0.0.1
    ytmsvc-version: 0.0.2
    excel-version: 0.0.1
    clickhouse: ClickHouse

public:
  example_cluster: 'cluster_name'
  yql:
    udf-cpp-dir: https://github.com/ytsaurus/ytsaurus/tree/main/yql/essentials/udfs
    udf-ivaluebuilder-example-link: https://github.com/ytsaurus/ytsaurus/tree/main/yql/essentials/udfs/examples/structs
    udf-ivaluebuilder-example: yql/essentials/udfs/examples/structs
    pages:
      syntax:
        pragma:
          package: '"project.package", "/path/to/package"'
          package-var: '"project.package", "{$_path}/to/package"'
          error-code-list: https://github.com/ytsaurus/ytsaurus/blob/main/yql/essentials/core/issue/protos/issue_id.proto
