package NYT.NTableClient.NProto;

option go_package = "go.ytsaurus.tech/yt/go/proto/client/table_client";

////////////////////////////////////////////////////////////////////////////////

message TFilesExternalSourceSpec
{
    repeated string uris = 1;
}

message TPrefixExternalSourceSpec
{
    required string prefix_uri = 1;
    optional bool recursive = 2 [default = false];
    repeated string include_regexes = 3;
    repeated string exclude_regexes = 4;
}

message TExternalSourceSpec
{
    oneof value {
        TFilesExternalSourceSpec files = 1;
        TPrefixExternalSourceSpec prefix = 2;
    }
}

////////////////////////////////////////////////////////////////////////////////
