package NYT.NChunkClient.NNbd.NProto;

import "yt/ytlib/chunk_client/proto/session_id.proto";

////////////////////////////////////////////////////////////////////////////////

message TReqOpenSession
{
    required NYT.NChunkClient.NProto.TSessionId session_id = 1;
    required int64 size = 2;
    required int32 fs_type = 3; // EFilesystemType
}

message TRspOpenSession
{
}

////////////////////////////////////////////////////////////////////////////////

message TReqCloseSession
{
    required NYT.NChunkClient.NProto.TSessionId session_id = 1;
}

message TRspCloseSession
{
}

////////////////////////////////////////////////////////////////////////////////

message TReqRead
{
    required NYT.NChunkClient.NProto.TSessionId session_id = 1;
    required int64 offset = 2;
    required int64 length = 3;
    optional uint64 cookie = 4;
}

message TRspRead
{
    optional uint64 cookie = 1;
    repeated fixed64 block_checksums = 2;
    optional bool should_close_session = 3;
}

////////////////////////////////////////////////////////////////////////////////

message TReqWrite
{
    required NYT.NChunkClient.NProto.TSessionId session_id = 1;
    required int64 offset = 2;
    optional uint64 cookie = 3;

    // Might be empty, or contain NullChecksum.
    repeated fixed64 block_checksums = 4;

    // If true, the data node flushes the written range to disk
    // (via sync_file_range) before replying, providing FUA semantics.
    optional bool flush = 5;
}

message TRspWrite
{
    optional uint64 cookie = 1;
    optional bool should_close_session = 2;
}

////////////////////////////////////////////////////////////////////////////////

////////////////////////////////////////////////////////////////////////////////

// ReadBatch reads multiple non-contiguous ranges in a single round-trip.
// The response attachments contain one block per sub-read in request order.
message TReqReadBatch
{
    message TSubrequest
    {
        required int64 offset = 1;
        required int64 length = 2;
    }

    required NYT.NChunkClient.NProto.TSessionId session_id = 1;
    optional uint64 cookie = 2;
    repeated TSubrequest subrequests = 3;
}

message TRspReadBatch
{
    optional uint64 cookie = 1;
    optional bool should_close_session = 2;
    // Response data: one attachment per subrequest, in request order.
}

////////////////////////////////////////////////////////////////////////////////

// WriteBatch writes multiple non-contiguous ranges in a single round-trip.
// The request attachments contain one block per sub-request in request order.
message TReqWriteBatch
{
    message TSubrequest
    {
        required int64 offset = 1;
    }

    required NYT.NChunkClient.NProto.TSessionId session_id = 1;
    optional uint64 cookie = 2;
    repeated TSubrequest subrequests = 3;
}

message TRspWriteBatch
{
    optional uint64 cookie = 1;
    optional bool should_close_session = 2;
}

////////////////////////////////////////////////////////////////////////////////

message TReqFlush
{
    required NYT.NChunkClient.NProto.TSessionId session_id = 1;
    optional uint64 cookie = 2;
}

message TRspFlush
{
    optional uint64 cookie = 1;
    optional bool should_close_session = 2;
}

////////////////////////////////////////////////////////////////////////////////

message TReqKeepSessionAlive
{
    required NYT.NChunkClient.NProto.TSessionId session_id = 1;
}

message TRspKeepSessionAlive
{
    optional bool should_close_session = 1;
}

////////////////////////////////////////////////////////////////////////////////
