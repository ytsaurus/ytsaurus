namespace: NYT::NSequoiaClient::NRecords

types:
  - table_name: location_replicas
    table_group: location_replicas_table
    type_name: TLocationReplicas
    fields:
      {% if version >= 4 %}
      - cpp_name: ChunkIdHash
        cpp_type: ui64
        column_name: chunk_id_hash
        column_type: Uint64
        sort_order: Ascending
        expression: farm_hash(chunk_id) % 16
      {% endif %}

      - cpp_name: CellTag
        cpp_type: NObjectClient::TCellTag
        column_name: cell_tag
        column_type: Uint16
        sort_order: Ascending

      - cpp_name: NodeId
        cpp_type: NNodeTrackerClient::TNodeId
        column_name: node_id
        column_type: Uint32
        sort_order: Ascending

      - cpp_name: LocationIndex
        cpp_type: NNodeTrackerClient::TChunkLocationIndex
        column_name: location_index
        column_type: Uint32
        sort_order: Ascending

      - cpp_name: ChunkId
        cpp_type: NChunkClient::TChunkId
        column_name: chunk_id
        column_type: String
        sort_order: Ascending

      {% if version >= 4 %}
      - cpp_name: ReplicaIndex
        cpp_type: i8
        column_name: replica_index
        column_type: Int8
        sort_order: Ascending

      - cpp_name: ReplicaState
        cpp_type: NChunkClient::EChunkReplicaState
        column_name: replica_state
        column_type: Int8
      {% else %}
      - cpp_name: ReplicaIndex
        cpp_type: i32
        column_name: replica_index
        column_type: Int32
        sort_order: Ascending

      - cpp_name: Fake
        cpp_type: bool
        column_name: fake
        column_type: Boolean
        aggregate: first
      {% endif %}

    verbatim: |
        static constexpr auto Table = ESequoiaTable::LocationReplicas;
