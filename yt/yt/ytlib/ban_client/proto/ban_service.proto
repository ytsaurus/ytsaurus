package NYT.NBanClient.NProto;

////////////////////////////////////////////////////////////////////////////////

message TReqGetUserBanned
{
    required string user_name = 1;
}

message TRspGetUserBanned
{
    required bool is_banned = 1;
}

////////////////////////////////////////////////////////////////////////////////

message TReqSetUserBanned
{
    required string user_name = 1;
    required bool is_banned = 2;
}

message TRspSetUserBanned
{ }

////////////////////////////////////////////////////////////////////////////////

message TReqListBannedUsers
{ }

message TRspListBannedUsers
{
    repeated string user_names = 1;
}

