package NYT.NFlow.NProto;

import "yt_proto/yt/core/misc/proto/guid.proto";

message TTimer
{
    // TimerMeta fields.
    required string message_id = 1;
    required uint64 system_timestamp = 2;
    optional uint64 event_timestamp = 3;
    required bytes stream_id = 4;
    // Timer fields.
    required bytes key = 5;
    required uint64 trigger_timestamp = 6;
}
